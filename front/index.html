<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary -->
    <title>Bike Tracker</title>
    <meta name="description" content="Real-time map of nearby e-bikes." />
    <meta name="theme-color" content="#000000" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bike Tracker – Find e-bikes near you" />
    <meta
      property="og:description"
      content="Real-time map of nearby e-bikes."
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bike Tracker – Find e-bikes near you" />
    <meta
      name="twitter:description"
      content="Real-time map of nearby e-bikes."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon (create these later) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
